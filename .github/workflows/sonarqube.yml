name: SonarQube

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "zulu"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner and tools
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner and coverage tool
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path "${{ runner.temp }}\scanner" -ItemType Directory -Force
          dotnet tool update dotnet-sonarscanner --tool-path "${{ runner.temp }}\scanner"
          dotnet tool update dotnet-coverage --tool-path "${{ runner.temp }}\scanner"

      - name: Build, test, and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          $scanner = "${{ runner.temp }}\scanner"
          $coveragePath = "$pwd\coverage.xml"

          & "$scanner\dotnet-sonarscanner" begin `
            /k:"Zaidkar_Avans-DevOps" `
            /o:"zaidkar" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.cs.vscoveragexml.reportsPaths="$coveragePath"

          dotnet build --no-incremental

          & "$scanner\dotnet-coverage" collect "dotnet test --no-build" -f xml -o "$coveragePath"

          & "$scanner\dotnet-sonarscanner" end `
            /d:sonar.token="$env:SONAR_TOKEN"